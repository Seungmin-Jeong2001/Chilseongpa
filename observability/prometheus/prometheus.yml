global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aws-prometheus'
    environment: 'prod'

# Alertmanager 연동
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Alert Rule 파일 로드
rule_files:
  - '/etc/prometheus/alert.rules.yml'

scrape_configs:

  # =========================================================
  # Prometheus self-scrape
  # =========================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - target_label: service
        replacement: 'prometheus'

  # =========================================================
  # [GCP] Cloud SQL 메트릭 수집
  # =========================================================
  - job_name: 'gcp-cloudsql'
    static_configs:
      - targets: ['localhost:9255']
        labels:
          cluster: 'gcp'
          service: 'cloudsql'
          environment: 'prod'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'stackdriver_cloudsql_googleapis_com_database_cpu_utilization'
        target_label: __name__
        replacement: 'cloudsql_cpu_utilization'

      - source_labels: [__name__]
        regex: 'stackdriver_cloudsql_googleapis_com_database_memory_usage'
        target_label: __name__
        replacement: 'cloudsql_memory_used_bytes'

      - source_labels: [__name__]
        regex: 'stackdriver_cloudsql_googleapis_com_database_network_connections'
        target_label: __name__
        replacement: 'cloudsql_network_connections_total'

      - source_labels: [__name__]
        regex: 'stackdriver_cloudsql_googleapis_com_database_disk_bytes_used'
        target_label: __name__
        replacement: 'cloudsql_disk_used_bytes'

  # =========================================================
  # [GCP] backend 서비스
  # =========================================================
  - job_name: 'gcp-backend'
    scheme: https
    metrics_path: '/metrics'
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets:
          - 'gcp-backend.app.bucheongoyangijanggun.com:443'
        labels:
          cluster: 'gcp'
          service: 'backend'
          environment: 'prod'
    metric_relabel_configs:
      # ── HTTP 요청 수 ──────────────────────────────────────
      - source_labels: [__name__]
        regex: 'http_requests_total'
        target_label: __name__
        replacement: 'backend_http_requests_total'

      # ── HTTP 응답 시간 ────────────────────────────────────
      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_sum'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_sum'

      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_bucket'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_bucket'

      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_count'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_total'

  # =========================================================
  # [GCP] Kubernetes Node - Cloudflare Zero Trust Tunnel 경유
  # =========================================================
  - job_name: 'gcp-kubernetes-nodes'
    scheme: https
    metrics_path: '/metrics'
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets:
          - 'gcp-nodes.app.bucheongoyangijanggun.com:443'
        labels:
          cluster: 'gcp'
          environment: 'prod'

  # =========================================================
  # [GCP] Kubernetes Pod - Cloudflare Zero Trust Tunnel 경유
  # =========================================================
  - job_name: 'gcp-kubernetes-pods'
    scheme: https
    metrics_path: '/metrics'
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets:
          - 'gcp-pods.app.bucheongoyangijanggun.com:443'
        labels:
          cluster: 'gcp'
          environment: 'prod'

  # =========================================================
  # [AWS] Kubernetes Node - Direct Scrape (Same VPC Private Subnet)
  # =========================================================
  - job_name: 'aws-kubernetes-nodes'
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
        api_server: 'https://3.36.100.5:6443'
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: '3.36.100.5:6443'
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics
      - target_label: cluster
        replacement: 'aws'
      - target_label: environment
        replacement: 'prod'

  # =========================================================
  # [AWS] backend 서비스
  # =========================================================
  - job_name: 'aws-backend'
    kubernetes_sd_configs:
      - role: pod
        api_server: 'https://3.36.100.5:6443'
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      # prometheus.io/scrape: "true" 어노테이션 있는 Pod만 수집
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      # <domain>-service 패턴의 Pod만 수집 (Naming Convention: kebab-case)
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: '.*-service'
      # /metrics 경로 설정
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: '${1}'
      - target_label: __metrics_path__
        replacement: '/metrics'
      # Pod IP + 포트 조합 (포트: 8000)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: '$1:$2'
        target_label: __address__
      # 메타 레이블 → 일반 레이블 변환
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      # 공통 레이블
      - target_label: cluster
        replacement: 'aws'
      - target_label: service
        replacement: 'backend'
      - target_label: environment
        replacement: 'prod'
    # GCP와 동일한 Naming Convention 적용
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'http_requests_total'
        target_label: __name__
        replacement: 'backend_http_requests_total'

      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_sum'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_sum'

      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_bucket'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_bucket'

      - source_labels: [__name__]
        regex: 'http_request_duration_seconds_count'
        target_label: __name__
        replacement: 'backend_http_request_duration_seconds_total'

  # =========================================================
  # [AWS] Kubernetes Pod - Direct Scrape (Same VPC Private Subnet)
  # =========================================================
  - job_name: 'aws-kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        api_server: 'https://3.36.100.5:6443'
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - target_label: cluster
        replacement: 'aws'
      - target_label: environment
        replacement: 'prod'