name: Build and Push Discord Bot

on:
  push:
    branches:
      - main # 💡 메인 브랜치에 푸시될 때만 실행
      - feature/** # 💡 feature 브랜치에도 푸시될 때 실행
    paths:
      - 'aiops/discord-bot/**' # 💡 해당 경로 변경 시에만 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./aiops/discord-bot
          push: true
          # 💡 사용자님의 도커 허브 계정명으로 변경하세요
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_BOT}}:latest