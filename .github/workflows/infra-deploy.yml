name: Infrastructure Provision & App Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'application/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch: # 수동 실행 허용

jobs:
  terraform:
    name: Infrastructure (Terraform)
    runs-on: ubuntu-latest
    outputs:
      inventory_data: ${{ steps.outputs.outputs.inventory_data }}
      db_sa_key: ${{ steps.outputs.outputs.db_sa_key }}
      gcp_k3s_ip: ${{ steps.outputs.outputs.gcp_k3s_ip }}
      gcp_mon_ip: ${{ steps.outputs.outputs.gcp_mon_ip }}

    env:
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_environment: ${{ secrets.ENVIRONMENT }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_gcp_db_password: ${{ secrets.GCP_DB_PASSWORD }}
      TF_VAR_gcp_credentials: "${{ github.workspace }}/infra/terraform/gcp-creds.json"
      TF_VAR_gcp_ssh_public_key: ${{ secrets.SSH_GCP_KEY_PUB }}
      TF_VAR_cf_api_token: ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cf_zone_id: ${{ secrets.CF_ZONE_ID }}
      TF_VAR_cf_tunnel_secret: ${{ secrets.CF_TUNNEL_SECRET }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      
      # 💡 GCS Backend 인증용 핵심 환경 변수
      GOOGLE_APPLICATION_CREDENTIALS: "${{ github.workspace }}/infra/terraform/gcp-creds.json"
      
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare GCP Credentials
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > infra/terraform/gcp-creds.json

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.PROJECT_NAME }}-tfstate" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Apply
        id: apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -no-color

      - name: Export Outputs for Ansible
        id: outputs
        working-directory: infra/terraform
        run: |
          # 1. 데이터를 변수에 담기
          INV_DATA=$(terraform output -json ansible_inventory_data)
          DB_KEY=$(terraform output -raw gcp_db_proxy_sa_key)
          
          # 2. IP 추출 (단순 문자열)
          GCP_IP=$(echo "$INV_DATA" | jq -r .gcp_ip)
          GCP_MON_IP=$(echo "$INV_DATA" | jq -r .gcp_mon_ip)
          echo "gcp_k3s_ip=$GCP_IP" >> $GITHUB_OUTPUT
          echo "gcp_mon_ip=$GCP_MON_IP" >> $GITHUB_OUTPUT
          
          # 3. 긴 JSON 및 시크릿 데이터를 EOF 방식을 사용하여 안전하게 출력
          echo "inventory_data<<EOF" >> $GITHUB_OUTPUT
          echo "$INV_DATA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "db_sa_key<<EOF" >> $GITHUB_OUTPUT
          echo "$DB_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  ansible:
    name: Deployment (Ansible)
    needs: terraform
    runs-on: ubuntu-latest
    
    env:
      ANSIBLE_VAULT_PASSWORD_FILE: ${{ github.workspace }}/infra/ansible/.vault_pass
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_GCP_KEY }}" > ~/.ssh/id_gcp
          echo "${{ secrets.SSH_AWS_KEY }}" > ~/.ssh/id_aws
          chmod 600 ~/.ssh/id_gcp ~/.ssh/id_aws
          
          # Scan GCP and AWS Bastion IPs
          INV_JSON='${{ needs.terraform.outputs.inventory_data }}'
          GCP_IP=$(echo $INV_JSON | jq -r .gcp_ip)
          GCP_MON_IP=$(echo $INV_JSON | jq -r .gcp_mon_ip)
          BASTION_IP=$(echo $INV_JSON | jq -r .bastion_ip)
          
          ssh-keyscan -H $GCP_IP >> ~/.ssh/known_hosts
          ssh-keyscan -H $GCP_MON_IP >> ~/.ssh/known_hosts
          ssh-keyscan -H $BASTION_IP >> ~/.ssh/known_hosts

      - name: Prepare Inventory
        working-directory: infra/ansible
        run: |
          INV_JSON='${{ needs.terraform.outputs.inventory_data }}'
          GCP_IP=$(echo $INV_JSON | jq -r .gcp_ip)
          GCP_MON_IP=$(echo $INV_JSON | jq -r .gcp_mon_ip)
          BASTION_IP=$(echo $INV_JSON | jq -r .bastion_ip)
          AWS_IP=$(echo $INV_JSON | jq -r .aws_ip)
          
          cat <<EOF > inventory.ini
          [gcp_primary]
          gcp-main ansible_host=$GCP_IP tunnel_token=$(echo $INV_JSON | jq -r .gcp_token) db_conn=$(echo $INV_JSON | jq -r .db_connection)

          [gcp_monitoring]
          gcp-monitor ansible_host=$GCP_MON_IP tunnel_token=$(echo $INV_JSON | jq -r .mon_token)

          [aws_bastion]
          aws-bastion ansible_host=$BASTION_IP

          [aws_nodes]
          aws-sub ansible_host=$AWS_IP tunnel_token=$(echo $INV_JSON | jq -r .aws_token)

          [gcp_primary:vars]
          ansible_ssh_private_key_file=~/.ssh/id_gcp

          [gcp_monitoring:vars]
          ansible_ssh_private_key_file=~/.ssh/id_gcp

          [aws_bastion:vars]
          ansible_ssh_private_key_file=~/.ssh/id_aws

          [aws_nodes:vars]
          ansible_ssh_private_key_file=~/.ssh/id_aws
          ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q ubuntu@$BASTION_IP -i ~/.ssh/id_aws -o StrictHostKeyChecking=no"'

          [all:vars]
          ansible_user=ubuntu
          gcp_project_id=$(echo $INV_JSON | jq -r .gcp_project_id)
          cf_client_id=$(echo $INV_JSON | jq -r .cf_id)
          cf_client_secret=$(echo $INV_JSON | jq -r .cf_secret)
          app_domain=$(echo $INV_JSON | jq -r .app_domain)
          grafana_domain=$(echo $INV_JSON | jq -r .grafana_domain)
          prometheus_domain=$(echo $INV_JSON | jq -r .prometheus_domain)
          EOF

      - name: Install Ansible and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: Create Vault Password File
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ${{ env.ANSIBLE_VAULT_PASSWORD_FILE }}
          chmod 600 ${{ env.ANSIBLE_VAULT_PASSWORD_FILE }}

      - name: Run Ansible Playbook
        working-directory: infra/ansible
        run: |
          ansible-playbook -i inventory.ini playbook.yml \
            --extra-vars "gcp_db_sa_content='${{ needs.terraform.outputs.db_sa_key }}'" \
            --extra-vars "project_name=${{ secrets.PROJECT_NAME }}" \
            --extra-vars "environment=${{ secrets.ENVIRONMENT }}" \
            --extra-vars "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            --extra-vars "dockerhub_token=${{ secrets.DOCKERHUB_TOKEN }}" \
            --extra-vars "dockerhub_repo=${{ secrets.DOCKERHUB_REPO }}" \
            --extra-vars "dockerhub_repo_bot=${{ secrets.DOCKERHUB_REPO_BOT }}" \
            --extra-vars "gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            --extra-vars "discord_bot_token=${{ secrets.DISCORD_BOT_TOKEN }}" \
            --extra-vars "discord_channel_id=${{ secrets.DISCORD_CHANNEL_ID }}" \
            --extra-vars "discord_webhook_url=${{ secrets.DISCORD_WEBHOOK_URL }}" \
            --extra-vars "gcp_db_password=${{ secrets.GCP_DB_PASSWORD }}" \
            --extra-vars "@group_vars/vault.yml"

      - name: Cleanup Vault Password File
        if: always()
        run: rm -f ${{ env.ANSIBLE_VAULT_PASSWORD_FILE }}