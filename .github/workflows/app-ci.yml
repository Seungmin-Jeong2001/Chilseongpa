name: Application CI (Docker Build & Push)

on:
  push:
    branches:
      #- main
    paths:
      - 'application/backend/**'
      - 'application/frontend/**'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./application/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:backend-prod-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:backend-prod-v1.0.${{ github.run_number }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./application/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:frontend-prod-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:frontend-prod-v1.0.${{ github.run_number }}
