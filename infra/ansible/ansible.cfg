# ==============================================================================
# [ansible.cfg]
# ==============================================================================
[defaults]
# 1. 인벤토리 파일 경로 지정 
inventory = ./inventory.ini

# 2. 처음 접속 시 SSH 지문 체크 생략 
host_key_checking = False

# 3. 기본 접속 유저 설정
remote_user = ubuntu

# 4. Ansible Vault 비밀번호 파일 경로 지정 
vault_password_file = .vault_pass

# 5. SSH 연결 속도 최적화 (Pipelining)
[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r