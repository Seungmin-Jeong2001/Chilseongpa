---
- name: K3s 설치 여부 확인 (중복 설치 방지)
  command: which k3s
  register: k3s_installed
  ignore_errors: true
  changed_when: false

- name: K3s  설치 스크립트 다운로드 및 실행
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --cluster-init" sh -
  when: k3s_installed.rc != 0 # k3s가 없을 때만 실행

- name: K3s 서비스가 정상적으로 실행 중인지 확인
  systemd:
    name: k3s
    state: started
    enabled: yes

# [추가] kube-state-metrics 설치
# node-exporter만으로는 Pod/Container 상태 수집 불가
# GCP(Primary)/AWS(Fallback) 모두 Pod/Container 상태 모니터링 필요
- name: Install kube-state-metrics
  ansible.builtin.shell: |
    kubectl apply -k https://github.com/kubernetes/kube-state-metrics/examples/standard
    kubectl delete svc kube-state-metrics -n kube-system --ignore-not-found
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: kube-state-metrics
      namespace: kube-system
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: kube-state-metrics
      ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30080
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
