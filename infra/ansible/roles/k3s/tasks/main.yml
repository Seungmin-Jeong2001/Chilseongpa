- name: K3s 설치 여부 확인
  command: which k3s
  register: k3s_installed
  ignore_errors: true
  changed_when: false

- name: K3s 설치
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -
  when: k3s_installed.rc != 0

- name: K3s 서비스 시작 및 활성화
  systemd:
    name: k3s
    state: started
    enabled: yes

# [추가] kube-state-metrics 설치
# node-exporter만으로는 Pod/Container 상태 수집 불가
# GCP(Primary)/AWS(Fallback) 모두 Pod/Container 상태 모니터링 필요
- name: Install kube-state-metrics
  ansible.builtin.shell: |
    kubectl apply -k https://github.com/kubernetes/kube-state-metrics/examples/standard
    kubectl delete svc kube-state-metrics -n kube-system --ignore-not-found
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: kube-state-metrics
      namespace: kube-system
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: kube-state-metrics
      ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30080
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
- name: kubeconfig 권한 설정
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'

- name: KUBECONFIG 환경변수 등록
  lineinfile:
    path: /etc/environment
    line: 'KUBECONFIG=/etc/rancher/k3s/k3s.yaml'

- name: node Ready 대기
  command: k3s kubectl wait --for=condition=Ready node --all --timeout=60s
  retries: 5
  delay: 10
