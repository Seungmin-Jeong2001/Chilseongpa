---
# 1. K3s 설치 및 서비스 활성화
- name: Check if k3s is installed
  command: which k3s
  register: k3s_installed
  failed_when: false
  changed_when: false

- name: Install k3s
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -
  when: k3s_installed.rc != 0

- name: Start and enable k3s service
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: yes

# 2. [완성형] Kube-state-metrics 배포 (Raw 파일 직접 설치)
- name: Deploy kube-state-metrics
  shell: |
    BASE_URL="https://raw.githubusercontent.com/kubernetes/kube-state-metrics/v2.10.0/examples/standard"
    for file in service-account.yaml cluster-role.yaml cluster-role-binding.yaml service.yaml deployment.yaml; do
      kubectl apply -f ${BASE_URL}/${file}
    done
    
    kubectl delete svc kube-state-metrics -n kube-system --ignore-not-found
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: kube-state-metrics
      namespace: kube-system
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: kube-state-metrics
      ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30080
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname in ['gcp-main', 'aws-sub']
  register: ksm_deploy_result
  failed_when: ksm_deploy_result.rc != 0

- name: Wait for KSM Deployment
  shell: "kubectl wait --for=condition=available deployment/kube-state-metrics -n kube-system --timeout=120s"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname in ['gcp-main', 'aws-sub']
  changed_when: false

# 3. AWS 전용: 영구 서비스 계정 및 토큰 생성 (Bot 접근용)
- name: Create Bot Admin for AWS
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: bot-admin
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: bot-admin-binding
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
    - kind: ServiceAccount
      name: bot-admin
      namespace: kube-system
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: bot-admin-token
      namespace: kube-system
      annotations:
        kubernetes.io/service-account.name: bot-admin
    type: kubernetes.io/service-account-token
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname == 'aws-sub'

- name: Get AWS Bot Token
  shell: "kubectl get secret bot-admin-token -n kube-system -o jsonpath='{.data.token}' | base64 -d"
  register: aws_bot_token_raw
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname == 'aws-sub'
  changed_when: false

# 4. Kubeconfig 정보 추출 및 외부용 변환 (핵심 보완)
- name: Slurp kubeconfig from master
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: k3s_config_encoded
  become: yes
  when: inventory_hostname in ['gcp-main', 'aws-sub']

- name: Set GCP Kubeconfig Fact
  set_fact:
    generated_kubeconfig: "{{ k3s_config_encoded.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + gcp_internal_ip + ':6443') }}"
  when: inventory_hostname == 'gcp-main'

- name: Set AWS Kubeconfig Fact (Token Auth + CA removal)
  set_fact:
    generated_kubeconfig: "{{ k3s_config_encoded.content | b64decode | 
      regex_replace('https://127.0.0.1:6443', 'https://aws-k8s.bucheongoyangijanggun.com') |
      regex_replace('certificate-authority-data: .*', 'insecure-skip-tls-verify: true') |
      regex_replace('client-certificate-data: .*', '') |
      regex_replace('client-key-data: .*', '') |
      regex_replace('user:', 'user:\n    token: ' + aws_bot_token_raw.stdout) }}"
  when: inventory_hostname == 'aws-sub'

- name: Display Kubeconfig for GHA Capture
  ansible.builtin.debug:
    msg: "KUBECONFIG_CONTENT_{{ inventory_hostname }}:{{ generated_kubeconfig | regex_replace('\\n', '___NEWLINE___') }}"
  when: inventory_hostname in ['gcp-main', 'aws-sub']

# 5. 원격 서버 로컬용 심볼릭 링크 유지
- name: Symlink k3s config for local use
  ansible.builtin.file:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/.kube/config
    state: link
    force: yes
  when: inventory_hostname in ['gcp-main', 'aws-sub']