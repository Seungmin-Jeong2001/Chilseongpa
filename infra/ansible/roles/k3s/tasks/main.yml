---
- name: K3s 설치 여부 확인
  command: which k3s
  register: k3s_installed
  failed_when: false      # ignore_errors 대신 사용하여 불필요한 빨간색 에러 로그 방지
  changed_when: false

- name: K3s 설치
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -
  when: k3s_installed.rc != 0

- name: K3s 서비스 시작 및 활성화
  systemd:
    name: k3s
    state: started
    enabled: yes

- name: Install kube-state-metrics
  ansible.builtin.shell: |
    kubectl apply -k https://github.com/kubernetes/kube-state-metrics/examples/standard
    kubectl delete svc kube-state-metrics -n kube-system --ignore-not-found
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: kube-state-metrics
      namespace: kube-system
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: kube-state-metrics
      ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30080
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  when: inventory_hostname in ['gcp-main', 'aws-sub']


- name: Set kubeconfig permissions
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'
  become: yes
  when: inventory_hostname in ['gcp-main', 'aws-sub']


- name: Register KUBECONFIG env var
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: 'KUBECONFIG=/etc/rancher/k3s/k3s.yaml'

- name: Wait for nodes to be Ready
  ansible.builtin.command: k3s kubectl wait --for=condition=Ready node --all --timeout=60s
  retries: 5
  delay: 10
  changed_when: false


- name: Ensure local configs directory exists
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ playbook_dir }}/configs"
    state: directory
    mode: '0755'
  run_once: true
  become: false


- name: Fetch kubeconfig from K3s masters
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/configs/kubeconfig-{{ inventory_hostname }}.yaml"
    flat: yes
  become: yes
  when: inventory_hostname in ['gcp-main', 'aws-sub']

- name: Update server address in local kubeconfig
  delegate_to: localhost
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/configs/kubeconfig-{{ inventory_hostname }}.yaml"
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  become: false
  when: inventory_hostname in ['gcp-main', 'aws-sub']
