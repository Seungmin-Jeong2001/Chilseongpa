---
# ---------------------------------------------------------
# 1. 스토리지 및 디렉토리 준비
# ---------------------------------------------------------
- name: Create Prometheus/Grafana data dirs (EBS)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: '0755'
  loop:
    - { path: "/var/lib/prometheus", owner: "65534", group: "65534" }
    - { path: "/var/lib/grafana", owner: "472", group: "472" }
  when: storage_setup_enabled | bool

- name: Create Prometheus/Grafana data dirs (Local)
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/data/{{ item.name }}"
    state: directory
    owner: "{{ item.id }}"
    group: "{{ item.id }}"
    mode: '0755'
  loop:
    - { name: "prometheus", id: "65534" }
    - { name: "grafana", id: "472" }
  when: not (storage_setup_enabled | bool)

# ---------------------------------------------------------
# 2. EBS 볼륨 마운트 (AWS 환경 전용)
# ---------------------------------------------------------
- name: Get EBS UUID
  ansible.builtin.command: blkid -s UUID -o value {{ ebs_device_name }}
  register: monitoring_disk_uuid
  failed_when: false
  changed_when: false
  when: storage_setup_enabled | bool

- name: Format and Mount EBS
  block:
    - name: Format EBS volume
      community.general.filesystem:
        fstype: ext4
        dev: "{{ ebs_device_name }}"
        force: false
      when: monitoring_disk_uuid.stdout == ""

    - name: Get UUID after format
      ansible.builtin.command: blkid -s UUID -o value {{ ebs_device_name }}
      register: monitoring_disk_uuid_after
      changed_when: false

    - name: Mount EBS volume
      ansible.posix.mount:
        path: /var/lib/prometheus
        src: "UUID={{ monitoring_disk_uuid_after.stdout | default(monitoring_disk_uuid.stdout) }}"
        fstype: ext4
        state: mounted

    - name: Set permissions for mounted volumes
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: '0755'
        recurse: true
      loop:
        - { path: "/var/lib/prometheus", owner: "65534", group: "65534" }
        - { path: "/var/lib/grafana", owner: "472", group: "472" }
  when: storage_setup_enabled | bool

# ---------------------------------------------------------
# 3. 설정 파일 및 대시보드 배포
# ---------------------------------------------------------
- name: Ensure Monitoring directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ monitoring_base_dir }}/configs"
    - "{{ monitoring_base_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_base_dir }}/grafana/provisioning/dashboards"

- name: Render Monitoring Templates (.j2)
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_base_dir }}/{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: "prometheus.yml.j2", dest: "prometheus.yml" }
    - { src: "alertmanager.yml.j2", dest: "alertmanager.yml" }
    - { src: "alert.rules.yml.j2", dest: "alert.rules.yml" }
    - { src: "docker-compose.yml.j2", dest: "docker-compose.yml" }
    - { src: "datasource.yml.j2", dest: "grafana/provisioning/datasources/datasource.yml" }
    - { src: "dashboard.yml.j2", dest: "grafana/provisioning/dashboards/dashboard.yml" }

- name: Copy actual Dashboard JSON files
  ansible.builtin.copy:
    # 💡 로컬의 roles/monitoring/files/dashboards/ 폴더 안의 모든 파일을 복사
    src: "dashboards/" 
    dest: "{{ monitoring_base_dir }}/grafana/provisioning/dashboards/"
    # ⭐ Grafana 컨테이너가 읽을 수 있도록 472(grafana user) 권한 부여
    owner: "472"
    group: "472"
    mode: '0644'

# ---------------------------------------------------------
# 4. Kubeconfig 및 GCP SA Key 보안 배포
# ---------------------------------------------------------
- name: Create Kubeconfig files from variables
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ monitoring_base_dir }}/configs/{{ item.name }}"
    mode: '0600'
  loop:
    - { name: "kubeconfig-gcp-main.yaml", content: "{{ hostvars['gcp-main']['generated_kubeconfig'] | default('') }}" }
    - { name: "kubeconfig-aws-sub.yaml", content: "{{ hostvars['aws-sub']['generated_kubeconfig'] | default('') }}" }
  when: item.content != ""

- name: Force remove gcp-sa-key path to prevent directory/file conflict
  ansible.builtin.file:
    path: "/home/ubuntu/gcp-sa-key.json"
    state: absent
  when: gcp_db_sa_path is defined

- name: Create GCP DB SA Key file from Artifact path
  ansible.builtin.copy:
    # 💡 GitHub Runner 아티팩트 경로에서 직접 읽어와 줄바꿈 깨짐 방지
    content: "{{ lookup('file', gcp_db_sa_path) }}"
    dest: "/home/ubuntu/gcp-sa-key.json"
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  when: gcp_db_sa_path is defined

# ---------------------------------------------------------
# 5. Docker 컨테이너 운영
# ---------------------------------------------------------
- name: Pre-pull monitoring images sequentially
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
  loop:
    - prom/prometheus:latest
    - grafana/grafana:latest
    - prom/alertmanager:latest
    - prometheuscommunity/stackdriver-exporter:latest
    - jeongseungmin/chilseongpa-bot_dockerhub:latest
  register: img_pull_result
  until: img_pull_result is succeeded
  retries: 5
  delay: 10

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}"
    state: present
    pull: missing

# ---------------------------------------------------------
# 6. DB Proxy (Cloud SQL Auth Proxy)
# ---------------------------------------------------------
- name: Cloud SQL Auth Proxy Setup (Host-level)
  block:
    - name: Download Proxy Binary
      ansible.builtin.get_url:
        url: https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64
        dest: /usr/local/bin/cloud-sql-proxy
        mode: '0755'
    
    - name: Run Proxy on port 3307
      ansible.builtin.shell: |
        pkill cloud-sql-proxy || true
        nohup /usr/local/bin/cloud-sql-proxy \
          --address 0.0.0.0 --port 3307 \
          --credentials-file /home/ubuntu/gcp-sa-key.json \
          {{ db_instance_name }} > /dev/null 2>&1 &
      changed_when: false