# ==============================================================================
# [app_deploy/tasks/main.yml]
# ==============================================================================
---
# 1. K8s 모듈로 네임스페이스 생성
- name: Ensure ktcloud7 namespace exists
  become: yes 
  kubernetes.core.k8s:
    name: ktcloud7
    api_version: v1
    kind: Namespace
    state: present

# [추가] 고립된 서비스가 있을 경우 삭제하여 NodePort 충돌 방지
- name: Remove orphaned backend-svc if exists
  kubernetes.core.k8s:
    name: backend-svc
    namespace: ktcloud7
    kind: Service
    state: absent
  ignore_errors: yes

# 2. cloud sql DB에 필요한 정보를 k8s db로 secret 생성
- name: Create Cloud SQL DB credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudsql-db-credentials
        namespace: "{{ k8s_namespace }}"
      type: Opaque
      stringData:
        DB_USER: "{{ vault_db_user }}"
        DB_PASSWORD: "{{ vault_db_password }}"
        DB_NAME: "{{ db_name }}"

# 3. cloud sql SA key를 k8s secret으로 생성
- name: Create Cloud SQL SA key secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudsql-sa-key
        namespace: "{{ k8s_namespace }}"
      type: Opaque
      data:
        sa-key.json: "{{ vault_sa_key_b64 }}"

# 4. Helm Chart 템플릿 폴더를 타겟 노드의 임시 경로로 복사
- name: Copy app-chart to target node
  ansible.builtin.copy:
    src: app-chart/
    dest: /tmp/app-chart/
    mode: '0755'

# 5. Helm 모듈로 앱 배포 (알아서 설치/업데이트 판단)
- name: Deploy application via Helm module
  kubernetes.core.helm:
    name: my-app
    chart_ref: /tmp/app-chart
    release_namespace: ktcloud7
    state: present
    values_files:
      - /tmp/app-chart/values.yaml
    wait: true
    atomic: true 
    force: true
    replace: false

# 6. Ingress 매니페스트 적용
- name: Apply Ingress manifest
  kubernetes.core.k8s:
    src: "/tmp/app-chart/ingress.yaml"
    state: present

# 7. HPA 매니페스트 적용
- name: Apply HPA manifest
  kubernetes.core.k8s:
    src: "/tmp/app-chart/backend-hpa.yaml"
    state: present