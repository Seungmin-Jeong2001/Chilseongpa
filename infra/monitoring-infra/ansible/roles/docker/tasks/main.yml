- name: Install system packages
  ansible.builtin.apt:
    name:
      - docker.io                 # Docker Engine 설치
      - docker-compose-plugin     # Docker Compose V2 plugin 설치
      - python3-pip               # Python 패키지 설치 도구
      - python3-setuptools        # Python 패키지 빌드 지원
    state: present
    update_cache: true

- name: Install docker python package
  ansible.builtin.pip:
    name:
      - docker                    # community.docker 모듈 실행에 필요

- name: Configure Docker log rotation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Restart Docker          # 설정 변경 시 Docker 재시작

- name: Enable Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true                  # 재부팅 후 자동 시작
    state: started                # 즉시 시작
